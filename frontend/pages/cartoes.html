<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartões — Finance App</title>
  <link rel="stylesheet" href="../css/style.css?v=4" />
  <link rel="stylesheet" href="../css/light-theme.css?v=4" />
  <link rel="stylesheet" href="../css/cards.css?v=4" />
  <link rel="stylesheet" href="../css/dashboard.css?v=4" />
  <link rel="stylesheet" href="../css/responsive.css?v=4" />
  <script src="../js/theme.js?v=4"></script>
</head>
<body data-page="cartoes">
  <aside id="sidebar"></aside>
  <div class="backdrop" id="backdrop"></div>

  <div class="main-area">
    <header id="topbar"></header>
    <div id="status" class="status" hidden></div>

    <main class="container">
      <!-- Visão geral: cards de uso de limite -->
      <section class="card">
        <div class="card-head"><h2>Meus cartões</h2></div>
        <div class="cards-grid" id="cards-cards"></div>
      </section>

      <!-- Faturas: detalhe da atual + próximas (com parcelas futuras) -->
      <section class="card" id="statements-section" hidden>
        <div class="card-head">
          <h2>Faturas</h2>
          <label class="period" style="margin:0">Cartão
            <select id="stmt-card"></select>
          </label>
        </div>
        <div id="statements"></div>
      </section>

      <!-- Cadastro / edição -->
      <section class="card">
        <div class="card-head"><h2 id="card-form-title">Novo cartão</h2></div>
        <form id="card-form" class="form">
          <input type="hidden" id="c-id" />
          <div class="row">
            <label class="field">Nome
              <input type="text" id="c-name" placeholder="Ex: Nubank" required />
            </label>
            <label class="field">Bandeira
              <select id="c-brand">
                <option>Visa</option>
                <option>Mastercard</option>
                <option>Elo</option>
                <option>American Express</option>
                <option>Hipercard</option>
                <option selected>Outra</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label class="field">Limite total (R$)
              <input type="number" id="c-limit" step="0.01" min="0" value="0" />
            </label>
            <label class="field">Status
              <select id="c-status">
                <option value="ativo" selected>Ativo</option>
                <option value="bloqueado">Bloqueado</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label class="field">Dia de fechamento
              <input type="number" id="c-closing" min="1" max="31" value="1" />
            </label>
            <label class="field">Dia de vencimento
              <input type="number" id="c-due" min="1" max="31" value="10" />
            </label>
          </div>
          <label class="field">Cor de destaque
            <input type="color" id="c-color" value="#8B5CF6" />
          </label>
          <div class="flex gap">
            <button type="submit" id="c-save" class="btn btn-primary"><i data-icon="save"></i> Adicionar cartão</button>
            <button type="button" id="c-cancel" class="btn btn-ghost" hidden>Cancelar</button>
          </div>
          <p id="c-msg" class="form-msg"></p>
        </form>

        <div class="card-manage-list" id="card-list" style="margin-top:16px"></div>
      </section>
    </main>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../js/icons.js?v=4"></script>
  <script src="../js/utils.js?v=4"></script>
  <script src="../js/api.js?v=4"></script>
  <script src="../js/ui.js?v=4"></script>
  <script src="../js/app.js?v=4"></script>
</body>
</html>
