<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metas — Finance App</title>
  <link rel="stylesheet" href="../css/style.css?v=4" />
  <link rel="stylesheet" href="../css/light-theme.css?v=4" />
  <link rel="stylesheet" href="../css/cards.css?v=4" />
  <link rel="stylesheet" href="../css/dashboard.css?v=4" />
  <link rel="stylesheet" href="../css/responsive.css?v=4" />
  <script src="../js/theme.js?v=4"></script>
</head>
<body data-page="metas">
  <aside id="sidebar"></aside>
  <div class="backdrop" id="backdrop"></div>

  <div class="main-area">
    <header id="topbar"></header>
    <div id="status" class="status" hidden></div>

    <main class="container">
      <!-- Visão geral: cards de progresso -->
      <section class="card">
        <div class="card-head"><h2>Minhas metas</h2></div>
        <div class="goals-grid" id="goals-cards"></div>
      </section>

      <!-- Cadastro / edição -->
      <section class="card">
        <div class="card-head"><h2 id="goal-form-title">Nova meta</h2></div>
        <form id="goal-form" class="form">
          <input type="hidden" id="g-id" />
          <label class="field">Nome
            <input type="text" id="g-name" placeholder="Ex: Reserva de emergência" required />
          </label>
          <div class="row">
            <label class="field">Tipo
              <select id="g-kind">
                <option value="poupanca">Poupança (juntar até uma data)</option>
                <option value="limite_gasto">Limite de gasto (teto por categoria/mês)</option>
                <option value="divida">Quitar dívida</option>
              </select>
            </label>
            <label class="field">Valor-alvo (R$)
              <input type="number" id="g-target" step="0.01" min="0.01" placeholder="0,00" required />
            </label>
          </div>
          <div class="row">
            <label class="field" id="g-category-wrap" hidden>Categoria (limite de gasto)
              <select id="g-category"></select>
            </label>
            <label class="field" id="g-current-wrap">Valor já alcançado (R$)
              <input type="number" id="g-current" step="0.01" min="0" value="0" />
            </label>
          </div>
          <div class="row">
            <label class="field">Início (opcional)
              <input type="date" id="g-start" />
            </label>
            <label class="field">Término (opcional)
              <input type="date" id="g-end" />
            </label>
          </div>
          <label class="field">Cor de destaque
            <input type="color" id="g-color" value="#10B981" />
          </label>
          <div class="flex gap">
            <button type="submit" id="g-save" class="btn btn-primary"><i data-icon="save"></i> Adicionar meta</button>
            <button type="button" id="g-cancel" class="btn btn-ghost" hidden>Cancelar</button>
          </div>
          <p id="g-msg" class="form-msg"></p>
        </form>

        <div class="goal-manage-list" id="goal-list" style="margin-top:16px"></div>
      </section>
    </main>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="../js/icons.js?v=4"></script>
  <script src="../js/utils.js?v=4"></script>
  <script src="../js/api.js?v=4"></script>
  <script src="../js/ui.js?v=4"></script>
  <script src="../js/app.js?v=4"></script>
</body>
</html>
